version: '3.9'

services:
  backend:
    image: ${ECR_IMAGE:-telled-backend:latest}
    container_name: telled-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/telled-crm/backend"
        awslogs-region: "${AWS_REGION:-ap-south-1}"
        awslogs-stream-prefix: "backend"
    networks:
      - telled-network

  nginx:
    image: nginx:1.25-alpine
    container_name: telled-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - telled-network

networks:
  telled-network:
    driver: bridge
